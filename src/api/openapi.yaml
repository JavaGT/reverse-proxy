openapi: 3.0.3
info:
  title: Reverse proxy management API
  version: "1.0"
  description: |
    Local-only control plane (binds to 127.0.0.1). **`@javagt/express-easy-auth`** at `/api/v1/auth` provides sessions (password, TOTP, passkeys). **Remote** clients must be signed in (session cookie `mgmt.sid`), including for static UI and read-only JSON routes; use **`GET /login.html`** in a browser or `POST /api/v1/auth/login` with a cookie-aware HTTP client. **Same-machine** clients need no credentials: logical loopback (127.0.0.0/8 or `::1`), trusted `X-Forwarded-For` loopback when `MANAGEMENT_TRUST_PROXY` is enabled, or a trusted forwarded IP that matches an address on this host (e.g. opening the public management hostname from the server through a local reverse proxy).

    **Errors:** All JSON error responses use:
    `{ "error": { "code": string, "message": string, "details": object | array | null, "resolution"?: string } }`.
    The optional **`resolution`** field is a short, stable hint for what to do next (auth, schema, env vars, OpenAPI). Unknown error codes still include a generic resolution pointing at this document.

    **Rate limit:** Global per management listener (default 300 requests per 60s; tune with `MANAGEMENT_RATE_LIMIT_MAX` and `MANAGEMENT_RATE_LIMIT_WINDOW_MS`).

    **Health checks:** When `options.healthPath` is set, the proxy GETs that path on each upstream periodically (`HEALTH_CHECK_INTERVAL_MS`) using native `fetch` (http/https). Success is HTTP status 200–399; redirects are not followed; timeout is 5 seconds. Failed probes mark that upstream unhealthy; the route stays registered. The data plane returns 503 when no healthy upstreams remain for the host. Omit `healthPath` to disable monitoring for that route. Each target in `GET /routes` may include `healthCheckedAt` (ISO 8601) after the first probe.

    **Persistence:** Routes and meta are stored in SQLite at **`./reverse-proxy.db`** (process working directory). **Multi-apex:** apex list may be set in SQLite via `PUT /api/v1/domains` (overrides the default apex list from Settings when present). Otherwise the default apex list from **`meta.server_settings`** / built-in defaults applies (comma-separated `rootDomains`). **`baseDomain` is always required** on `POST /api/v1/reserve` (each item in a batch) and as a **query parameter** on `DELETE /api/v1/reserve/{subdomain}` so reservations are explicit. **Batch:** send `{ "reservations": [ { "subdomain", "baseDomain", "port" | "ports" | "targets" }, … ] }` to create several mappings in one request (possibly different apexes).

    **Official Node client:** npm package **`@javagt/reverse-proxy-client`** — `createHttpClient({ baseUrl })` for this API (same-machine or callers that reuse a session cookie), optional `createDbClient` / `createAutoClient` against the same SQLite file, CLI **`reverse-proxy-mgmt`**, and `ManagementApiError` for JSON errors. See `GET /llms.txt` and `packages/reverse-proxy-client/README.md` in the server repository.

    **Account registration:** Configure **`MANAGEMENT_REGISTRATION_SECRET`** in **`GET /api/v1/settings`** / **`PUT /api/v1/settings`** (SQLite `meta.server_settings`). `POST /api/v1/auth/register` requires JSON field **`registrationSecret`** matching that value. **`GET /api/v1/registration-secret`** returns the secret when configured. The **Accounts** page (**`/accounts.html`**) lists users and shows the invite secret (masked) with copy. **`GET /api/v1/accounts`** lists accounts; **`DELETE /api/v1/accounts/{userId}`** removes a user (not yourself; not the last account).

    **Server settings:** Tunables (TLS path, management port, auth/WebAuthn fallbacks, rate limits, registration/session secrets, network probe timeouts, etc.) live in SQLite **`meta.server_settings`**, merged with built-in defaults at startup and after **`PUT /api/v1/settings`**. Use **`GET /settings.html`** or **`GET /api/v1/settings`**; **`PUT /api/v1/settings`** requires **localhost TCP** (same as **`PUT /ddns`**) plus a session when not same-machine.

    **Registrar / DDNS configuration:** (1) **DDNS** (automated A/AAAA updates) — stored in **`meta.ddns`** as versioned **`jobs`** (Porkbun JSON API, Namecheap XML API, …), edited via **`PUT /api/v1/ddns`** or **`/ddns.html`** (UI focuses on the legacy **`default`** Porkbun job; multi-job edits use the API). (2) **DNS management console links** (open registrar UI per apex) — stored in **`meta.root_domains`** as optional **`dnsConsole`** (`defaultProvider`, **`byApex`**), edited via **`PUT /api/v1/domains`** or the Domains panel. Link resolution order is: **`byApex[apex]`** → **`dnsConsole.defaultProvider`** → **`dnsConsoleDefaultProvider`** in **`meta.server_settings`**. (3) **Global fallback only** — **`dnsConsoleDefaultProvider`** in **`meta.server_settings`** when **`dnsConsole`** omits a default or is null. Console link implementations live under **`src/infrastructure/dns/console/`** (e.g. Porkbun, Namecheap).

servers:
  - url: http://127.0.0.1:{port}
    description: Management API (localhost only; default port 24789 from MANAGEMENT_INTERFACE_PORT)

security:
  - sessionCookie: []

paths:
  /api/v1/health:
    get:
      summary: Control plane liveness
      operationId: getHealth
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        example: OK
                      dataPlaneActive:
                        type: boolean
                        description: False when the HTTPS proxy (ports 80/443) is not running (e.g. TLS not configured or failed to load).
                      notice:
                        type: string
                        description: Present when `dataPlaneActive` is false; hints to configure TLS and restart.
        "401":
          description: Invalid or missing session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/status:
    get:
      summary: Alias of /api/v1/health
      operationId: getStatus
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                      dataPlaneActive:
                        type: boolean
                      notice:
                        type: string
                        example: OK
        "401":
          description: Invalid or missing session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/registration-secret:
    get:
      summary: Shared registration secret (same-machine or session)
      description: |
        Returns `MANAGEMENT_REGISTRATION_SECRET` when configured (`data.configured` true and `data.secret`). Same auth as other management routes: **same-machine** requests are allowed without a session; **remote** clients need a valid session cookie. Use the value as `registrationSecret` in `POST /api/v1/auth/register`.
      operationId: getRegistrationSecret
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Whether registration is configured and the secret string
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      configured:
                        type: boolean
                      secret:
                        type: string
                        nullable: true
        "401":
          description: Not signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/accounts:
    get:
      summary: List management accounts (express-easy-auth users)
      description: |
        Returns non-sensitive fields for each user (`id`, `username`, `email`, 2FA flags, passkey count, timestamps). Same auth as other management JSON (same-machine or session).
      operationId: listAccounts
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Account rows
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      accounts:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                            username:
                              type: string
                            email:
                              type: string
                            totpEnabled:
                              type: boolean
                            mfaRequired:
                              type: boolean
                            passkeyCount:
                              type: integer
                            createdAt:
                              type: integer
                              description: Unix timestamp (ms)
                            updatedAt:
                              type: integer
                              description: Unix timestamp (ms)
        "401":
          description: Unauthorized for remote clients without session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/accounts/{userId}:
    delete:
      summary: Remove a management account
      description: |
        Deletes the user and related auth data (sessions, passkeys, etc.). Cannot delete your own account while signed in, or the last remaining account.
      operationId: deleteAccount
      security:
        - sessionCookie: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized for remote clients without session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Unknown user id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Cannot delete own account or last account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/settings:
    get:
      summary: Effective server settings (SQLite + defaults)
      description: |
        Returns merged settings (camelCase) and which secrets are configured. Does not return secret values.
        `bootstrapEnvKeys` is reserved for future use and is currently always empty.
        `ui` describes field labels, input types, hints, and accordion groups for the management Settings page (same source as `serverSettingsUi.mjs`).
      operationId: getServerSettings
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Settings envelope
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      settings:
                        type: object
                        additionalProperties: true
                      secretsConfigured:
                        type: object
                        properties:
                          registrationSecret:
                            type: boolean
                          sessionSecret:
                            type: boolean
                      bootstrapEnvKeys:
                        type: array
                        items:
                          type: string
                      ui:
                        type: object
                        description: Settings page field metadata and groups
                        additionalProperties: true
        "401":
          description: Unauthorized for remote clients without session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "501":
          description: SQLite persistence not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      summary: Update server settings in SQLite
      description: |
        Partial JSON body (camelCase keys). Use `null` for a key to remove the SQLite override and fall back to the built-in default.
        Secrets (`managementRegistrationSecret`, `managementSessionSecret`) are strings when set.
        Requires localhost binding; remote clients need a session. Restart the process for some changes (port, TLS dir, session secret, trust proxy, rate limits) to apply everywhere.
        Response includes the same `ui` field metadata as `GET /api/v1/settings` for the Settings page.
      operationId: putServerSettings
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Updated settings and notice
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    additionalProperties: true
        "400":
          description: Invalid body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not from localhost
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "501":
          description: SQLite persistence not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/domains:
    get:
      summary: List configured apex domains
      description: |
        Returns **`dnsConsole`** (stored JSON), resolved **`dnsConsoleLinks`**, and known **`dnsConsoleProviderIds`**.
        For link resolution order, see the top-level **Porkbun-related configuration** note.
      operationId: listDomains
      responses:
        "200":
          description: Primary and full apex list (from SQLite when configured, else env)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      primary:
                        type: string
                      apexDomains:
                        type: array
                        items:
                          type: string
                      dnsConsole:
                        nullable: true
                        type: object
                      dnsConsoleLinks:
                        type: array
                        items:
                          type: object
                          properties:
                            apex:
                              type: string
                            provider:
                              type: string
                            label:
                              type: string
                            url:
                              type: string
                      dnsConsoleProviderIds:
                        type: array
                        items:
                          type: string
    put:
      summary: Replace configured apex domains (SQLite)
      description: |
        Persists the ordered apex list to SQLite (`meta.root_domains`). First entry is primary.
        Optional **`dnsConsole`** selects modular DNS management links (e.g. `porkbun`). Omit the **`dnsConsole`** property to leave the stored value unchanged; send **`dnsConsole`: null** to clear it (then only **`DNS_CONSOLE_DEFAULT_PROVIDER`** / Settings apply for defaults). Empty **`dnsConsole`: {}** is invalid.
        When **`dnsConsole`** is sent, it replaces the previous document; include both **`apexDomains`** and the full desired **`dnsConsole`** shape. Link resolution: **`byApex`** → **`defaultProvider`** → **`DNS_CONSOLE_DEFAULT_PROVIDER`** (see top-level Porkbun note).
        All existing routes must remain under a listed apex. Requires localhost; remote clients need an express-easy-auth session.
      operationId: putDomains
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [apexDomains]
              properties:
                apexDomains:
                  type: array
                  minItems: 1
                  items:
                    type: string
                dnsConsole:
                  nullable: true
                  type: object
                  properties:
                    defaultProvider:
                      nullable: true
                      type: string
                    byApex:
                      type: object
                      additionalProperties:
                        nullable: true
                        type: string
      responses:
        "200":
          description: Updated primary and apex list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      primary:
                        type: string
                      apexDomains:
                        type: array
                        items:
                          type: string
                      dnsConsole:
                        nullable: true
                        type: object
                      dnsConsoleLinks:
                        type: array
                        items:
                          type: object
        "400":
          description: Validation or route conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid or missing session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/routes:
    get:
      summary: List all routes (persistent and ephemeral)
      description: |
        Read-only listing; the listener is only reachable on localhost. Routes have no per-client “ownership” field in the payload.
      operationId: listRoutes
      responses:
        "200":
          description: Route list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/RouteEntry"
  /api/v1/network:
    get:
      summary: Local/public IPs and DNS snapshot
      description: |
        Non-loopback interface addresses, public IPv4/IPv6 from HTTPS IP discovery (same services as optional DDNS),
        and DNS A/AAAA lookups for each configured apex plus a catch-all probe hostname per apex (`rp-wc-<hex>.<apex>`).
        Route hostnames are not included (see `GET /api/v1/routes`). Compare `matchesPublicIpv*` to see if resolved addresses include the reported public IP.
        Includes an optional HTTPS self-probe to each reported public address on the ingress port (default 443, env `PUBLIC_INGRESS_PROBE_HTTPS_PORT`) with certificate verification disabled for that probe only, plus a `cgnatNote` when no public IPv4 was discovered.
      operationId: getNetwork
      responses:
        "200":
          description: Snapshot (see `generatedAt`)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/NetworkStatus"
        "500":
          description: Unexpected failure building the report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/ddns:
    get:
      summary: Porkbun DDNS status
      description: |
        Reads the `meta.ddns` document in SQLite when present; otherwise returns an unconfigured summary (`configSource: none`).
        The background scheduler uses only SQLite—environment variables are not used for DDNS.
        API keys are never returned in JSON—only whether credentials appear configured. Includes `cachedPublicIp`
        from SQLite after a successful sync when persistence exposes the database.
        Multi-job summaries resolve apex-mode domains and registrar eligibility using a single apex list and DNS-console
        context snapshot per response build (`snapshotDdnsResolveContext` in `src/ddns/ddnsConfigResolve.mjs`), so each job
        in `jobs` sees the same environment for that request. Response fields `cachedPublicIp`, `cachedPublicIpByJob`,
        and `lastRun` are best-effort from SQLite meta; omit or null when unreadable.
      operationId: getDdns
      responses:
        "200":
          description: Current DDNS summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/DdnsStatus"
        "500":
          description: Unexpected failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      summary: Save Porkbun DDNS settings to SQLite
      description: |
        Persists DDNS to `meta.ddns` (includes API secrets—protect database backups). The background scheduler
        reads this row each cycle, so changes apply without restarting the process. Omit `porkbunApiKey` /
        `porkbunSecretKey` or send empty strings to keep existing stored keys on update.
        Requires localhost; remote clients need an express-easy-auth session.
      operationId: putDdns
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DdnsPutRequest"
      responses:
        "200":
          description: Saved; returns same shape as GET `data`
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/DdnsStatus"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid or missing session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "501":
          description: Persistence is not SQLite
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Unexpected failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: Remove saved DDNS settings from SQLite
      description: |
        Deletes `meta.ddns` and `meta.ddns_last_run`; DDNS stays off until configured again with `PUT`.
        Does not erase the public IP cache row. Requires localhost; remote clients need an express-easy-auth session.
      operationId: deleteDdns
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Cleared; returns same shape as GET `data` (unconfigured until saved again)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/DdnsStatus"
        "401":
          description: Invalid or missing session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "501":
          description: Persistence is not SQLite
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Unexpected failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/ddns/sync:
    post:
      summary: Run DDNS sync once (all jobs or one job)
      description: |
        Triggers the same sync path as the background scheduler (IP discovery, registrar DNS updates, per-job SQLite IP cache).
        Persists last-run telemetry to `meta.ddns_last_run` (keyed by job id). Requires saved `meta.ddns` settings and localhost TCP
        (same as `PUT /ddns`); remote clients need a session.
        Without `jobId`, runs every enabled job with valid credentials and at least one zone. With `?jobId=…`, runs only that job.
      operationId: postDdnsSync
      security:
        - sessionCookie: []
      parameters:
        - in: query
          name: jobId
          required: false
          schema:
            type: string
          description: Optional DDNS job id; when set, only that job is synced (must be enabled and runnable).
      responses:
        "200":
          description: Sync finished; returns same `data` shape as `GET /api/v1/ddns` (including `lastRun`)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/DdnsStatus"
        "400":
          description: No saved DDNS row, or sync cannot run (disabled, missing keys, or no zones)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid or missing session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Sync threw (e.g. Porkbun API error); last failure may be recorded under `lastRun`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "501":
          description: Persistence lacks last-run support
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/openapi.yaml:
    get:
      summary: OpenAPI document (this file)
      description: Same YAML is also served at `GET /openapi.yaml` on the management host (root).
      operationId: getOpenApiV1
      responses:
        "200":
          description: YAML document
          content:
            application/yaml:
              schema:
                type: string
        "500":
          description: Failed to read spec from disk
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /openapi.yaml:
    get:
      summary: OpenAPI document (alias at site root)
      description: Identical to `GET /api/v1/openapi.yaml`.
      operationId: getOpenApiRoot
      responses:
        "200":
          description: YAML document
          content:
            application/yaml:
              schema:
                type: string
        "500":
          description: Failed to read spec from disk
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/scan:
    post:
      summary: Scan a TCP port range on localhost
      description: |
        Discovers listening ports in `[start, end]` (inclusive). Default range 3000–4000.
        Requires `end - start` between **1** and **10,000** (so a zero-width range is rejected).
        Optional `concurrency` (default 100) controls parallel connect attempts.
      operationId: scanPorts
      security:
        - sessionCookie: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PortScanRequest"
            examples:
              default:
                summary: Default range
                value: {}
              narrow:
                summary: Custom inclusive range
                value: { start: 24789, end: 24799, concurrency: 50 }
      responses:
        "200":
          description: Open ports with best-effort process metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/PortScanResponse"
        "400":
          description: Invalid range or body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid or missing session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Scan failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/process/{port}:
    delete:
      summary: Terminate a process listening on a TCP port
      description: |
        Sends OS-specific signals to the listener on `port`. Returns 404 if nothing is listening.
        Path `port` must be an integer; non-numeric paths yield `INVALID_PORT`.
      operationId: killProcess
      security:
        - sessionCookie: []
      parameters:
        - name: port
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 65535
      responses:
        "200":
          description: Process terminated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    required: [message]
                    properties:
                      message:
                        type: string
        "400":
          description: Invalid port in path
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid or missing session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No listening process on that port
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Kill failed (permissions, race, etc.)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/reserve:
    post:
      summary: Reserve a subdomain to upstream target(s)
      description: |
        Single mapping or batch: if the body contains a `reservations` array, each entry is reserved in order (same validation as a single call); on conflict or error after partial success, created items are rolled back.
        Idempotent: repeating the same subdomain, `baseDomain`, targets, and options returns 200 with the same mapping.
        Conflicting reservations return 409 `SUBDOMAIN_CONFLICT` (not 401).
      operationId: reserve
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReserveRequest"
      responses:
        "200":
          description: Idempotent replay; mapping unchanged
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    oneOf:
                      - $ref: "#/components/schemas/ReserveResponse"
                      - $ref: "#/components/schemas/ReserveBatchResponse"
        "201":
          description: Created or replaced an existing replaceable route (or batch with at least one created item)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    oneOf:
                      - $ref: "#/components/schemas/ReserveResponse"
                      - $ref: "#/components/schemas/ReserveBatchResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid or missing session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Subdomain held by a healthy service that cannot be replaced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/reserve/{subdomain}:
    delete:
      summary: Release a reserved subdomain
      operationId: release
      security:
        - sessionCookie: []
      parameters:
        - name: subdomain
          in: path
          required: true
          schema:
            type: string
        - name: baseDomain
          in: query
          required: true
          description: Apex FQDN for the mapping to release
          schema:
            type: string
      responses:
        "200":
          description: Released
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: mgmt.sid
      description: Session cookie after sign-in at `/login.html` or `POST /api/v1/auth/login`. Required for remote clients; same-machine (local operator) clients may omit.
  schemas:
    DdnsPutRequest:
      type: object
      description: |
        Legacy **v1** body (flat Porkbun-only fields) updates the job with id `default` and preserves other jobs.
        **v2** body: `{ "version": 2, "jobs": [ ... ] }` replaces the full job list (see per-job `credentials` by `provider`).
      properties:
        version:
          type: integer
          enum: [2]
          description: When `2`, `jobs` is required and replaces all stored jobs.
        jobs:
          type: array
          description: DDNS jobs when `version` is 2.
          items:
            $ref: "#/components/schemas/DdnsJobStored"
        enabled:
          type: boolean
        porkbunApiKey:
          type: string
          description: Omit or empty to keep previous value when updating an existing row.
        porkbunSecretKey:
          type: string
          description: Omit or empty to keep previous value when updating an existing row.
        domainMode:
          type: string
          enum: [apex, explicit]
          description: "`apex` uses configured registry apex domains at each sync; `explicit` uses `domains`."
        domains:
          type: array
          items:
            type: string
          description: Required when `domainMode` is `explicit` (apex FQDNs).
        matchNote:
          type: string
          description: Porkbun DNS record note filter; default when omitted on first save.
        intervalMs:
          type: integer
          minimum: 10000
          maximum: 86400000
        ipLookupTimeoutMs:
          type: integer
          minimum: 1000
          maximum: 120000
        ipv4Services:
          type: array
          items:
            type: string
            format: uri
          description: Optional HTTP(S) URLs tried in order for IPv4 discovery; omit to keep previous or defaults.
        ipv6Services:
          type: array
          items:
            type: string
            format: uri
          description: Optional HTTP(S) URLs for IPv6 discovery.
        porkbunApiBaseUrl:
          type: string
          format: uri
          description: Optional Porkbun JSON API v3 base URL; default official endpoint when omitted.
    DdnsJobStored:
      type: object
      description: Normalized DDNS job (stored in SQLite under `meta.ddns` when `version` is 2).
      required: [id, provider, enabled, credentials, domainMode, domains, matchNote, intervalMs, ipLookupTimeoutMs, ipv4Services, ipv6Services]
      properties:
        id:
          type: string
          pattern: "^[a-zA-Z0-9][a-zA-Z0-9._-]*$"
        provider:
          type: string
          enum: [porkbun, namecheap]
        enabled:
          type: boolean
        credentials:
          type: object
          description: Provider-specific secrets and options (see Porkbun and Namecheap field names in source / examples).
        domainMode:
          type: string
          enum: [apex, explicit]
        domains:
          type: array
          items:
            type: string
        matchNote:
          type: string
        intervalMs:
          type: integer
        ipLookupTimeoutMs:
          type: integer
        ipv4Services:
          type: array
          items:
            type: string
        ipv6Services:
          type: array
          items:
            type: string
    DdnsStatus:
      type: object
      description: |
        Public DDNS summary (no API secrets). Job rows share one apex/DNS-console snapshot per response build.
        Fields `cachedPublicIp`, `cachedPublicIpByJob`, and `lastRun` are populated when SQLite meta is readable.
      required:
        - provider
        - configSource
        - configInvalid
        - enabled
        - credentialsConfigured
        - domains
        - domainListSource
        - matchNote
        - intervalMs
        - ipLookupTimeoutMs
        - ipv4Services
        - ipv6Services
        - porkbunApiBaseUrl
        - schedulerWouldRun
        - schedulerState
      properties:
        provider:
          type: string
          example: porkbun
        configSource:
          type: string
          enum: [none, sqlite]
        configInvalid:
          type: boolean
          description: True when a SQLite `ddns` row exists but failed validation (scheduler skips until fixed).
        configInvalidMessage:
          nullable: true
          type: string
        domainMode:
          nullable: true
          type: string
          enum: [apex, explicit]
          description: Set when `configSource` is `sqlite`; null when unconfigured (`none`).
        enabled:
          type: boolean
        credentialsConfigured:
          type: boolean
        domains:
          type: array
          items:
            type: string
        domainListSource:
          type: string
          enum: [NONE, STORED_EXPLICIT, STORED_APEX]
        matchNote:
          type: string
        intervalMs:
          type: integer
        ipLookupTimeoutMs:
          type: integer
        ipv4Services:
          type: array
          items:
            type: string
        ipv6Services:
          type: array
          items:
            type: string
        porkbunApiBaseUrl:
          type: string
        schedulerWouldRun:
          type: boolean
        schedulerState:
          type: string
          enum: [running, disabled, missing_credentials, no_domains, not_configured]
        schemaVersion:
          type: integer
          enum: [2]
          description: Present when the stored document uses the multi-job schema.
        jobs:
          type: array
          description: Per-job public summaries (no API secrets).
          items:
            $ref: "#/components/schemas/DdnsJobSummary"
        cachedPublicIp:
          nullable: true
          type: object
          description: Cached public IP for the first/default job (same as legacy single-job behavior).
          properties:
            ipv4:
              nullable: true
              type: string
            ipv6:
              nullable: true
              type: string
        cachedPublicIpByJob:
          type: object
          description: Cached public IP per DDNS job id (after at least one successful sync for that job).
          additionalProperties:
            nullable: true
            type: object
            properties:
              ipv4:
                nullable: true
                type: string
              ipv6:
                nullable: true
                type: string
        lastRun:
          description: Last completed sync attempts per job id (`meta.ddns_last_run`).
          oneOf:
            - type: "null"
            - $ref: "#/components/schemas/DdnsLastRunEnvelope"
    DdnsLastRunEnvelope:
      type: object
      required: [jobs]
      properties:
        jobs:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/DdnsLastRun"
    DdnsJobSummary:
      type: object
      properties:
        id:
          type: string
        provider:
          type: string
          enum: [porkbun, namecheap]
        enabled:
          type: boolean
        credentialsConfigured:
          type: boolean
        domains:
          type: array
          items:
            type: string
        domainListSource:
          type: string
        domainMode:
          type: string
        matchNote:
          type: string
        intervalMs:
          type: integer
        ipLookupTimeoutMs:
          type: integer
        ipv4Services:
          type: array
          items:
            type: string
        ipv6Services:
          type: array
          items:
            type: string
        porkbunApiBaseUrl:
          type: string
        namecheapSandbox:
          type: boolean
        namecheapSyncRecordNames:
          type: array
          items:
            type: string
        schedulerWouldRun:
          type: boolean
        schedulerState:
          type: string
    DdnsLastRun:
      type: object
      required: [at, outcome, detail]
      properties:
        at:
          type: string
          format: date-time
        outcome:
          type: string
          enum: [success, skipped, failed]
        detail:
          type: string
        skippedBecause:
          nullable: true
          type: string
          description: Present when `outcome` is `skipped` (e.g. `ip_unchanged`, `no_public_ip`).
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, details]
          properties:
            code:
              type: string
              description: Stable machine-readable code (e.g. UNAUTHORIZED, SUBDOMAIN_CONFLICT).
            message:
              type: string
            details:
              nullable: true
              oneOf:
                - type: object
                - type: array
            resolution:
              type: string
              description: Optional actionable next step for operators and automation.
    PortScanRequest:
      type: object
      properties:
        start:
          type: integer
          description: First port (inclusive). Default 3000.
        end:
          type: integer
          description: Last port (inclusive). Default 4000.
        concurrency:
          type: integer
          description: Parallel connection attempts. Default 100.
    PortScanResponse:
      type: object
      required: [openPorts]
      properties:
        openPorts:
          type: array
          items:
            type: object
            required: [port, process]
            properties:
              port:
                type: integer
              process:
                type: object
                properties:
                  command:
                    type: string
                  pid:
                    oneOf:
                      - type: string
                      - type: integer
    ReserveRequest:
      oneOf:
        - $ref: "#/components/schemas/SingleReserveRequest"
        - $ref: "#/components/schemas/BatchReserveRequest"
    SingleReserveRequest:
      allOf:
        - type: object
          required: [subdomain, baseDomain]
          properties:
            subdomain:
              type: string
              description: Single DNS label (left of the apex)
            baseDomain:
              type: string
              description: Apex FQDN (must be one of the configured apex domains)
            port:
              type: integer
            ports:
              type: array
              items:
                type: integer
            targets:
              type: array
              items:
                oneOf:
                  - type: string
                  - type: object
            options:
              type: object
              properties:
                healthPath:
                  type: string
                  description: Must start with /, max 256 chars, no whitespace or //
                allowlist:
                  type: array
                  items:
                    type: string
                  description: Optional client IP allowlist for the route
        - oneOf:
            - required: [port]
            - required: [ports]
            - required: [targets]
    BatchReserveRequest:
      type: object
      required: [reservations]
      properties:
        reservations:
          type: array
          minItems: 1
          description: Each element uses the same shape as a single reserve body (subdomain, baseDomain, port | ports | targets, optional options)
          items:
            $ref: "#/components/schemas/SingleReserveRequest"
    ReserveBatchResponse:
      type: object
      required: [batch, results]
      properties:
        batch:
          type: boolean
          example: true
        results:
          type: array
          items:
            type: object
            required: [outcome, data]
            properties:
              outcome:
                type: string
                enum: [created, unchanged]
              data:
                $ref: "#/components/schemas/ReserveResponse"
    ReserveResponse:
      type: object
      properties:
        host:
          type: string
          example: my-app.{{rootDomain}}
        baseDomain:
          type: string
          example: {{rootDomain}}
        rootDomain:
          type: string
          example: {{rootDomain}}
        publicUrl:
          type: string
          description: Preferred public URL (HTTPS by default)
          example: https://my-app.{{rootDomain}}
        publicUrlHttp:
          type: string
          example: http://my-app.{{rootDomain}}
        targets:
          type: array
          items:
            type: object
        options:
          type: object
    NetworkStatus:
      type: object
      properties:
        generatedAt:
          type: string
          format: date-time
        localAddresses:
          type: array
          items:
            type: object
            properties:
              interface:
                type: string
              address:
                type: string
              family:
                type: string
                enum: [IPv4, IPv6]
              internal:
                type: boolean
        publicIp:
          type: object
          properties:
            ipv4:
              type: string
              nullable: true
            ipv6:
              type: string
              nullable: true
        publicIngressSelfCheck:
          type: object
          description: HTTPS GET from this server to its own reported public IP(s) on the ingress probe port (hairpin / port-forward hint).
          properties:
            port:
              type: integer
              description: TCP port probed (default 443; override with `PUBLIC_INGRESS_PROBE_HTTPS_PORT`).
            ipv4:
              type: object
              nullable: true
              description: Omitted as null when no public IPv4 was discovered.
              properties:
                ok:
                  type: boolean
                statusCode:
                  type: integer
                  nullable: true
                error:
                  type: string
                  nullable: true
                url:
                  type: string
            ipv6:
              type: object
              nullable: true
              description: Omitted as null when no public IPv6 was discovered.
              properties:
                ok:
                  type: boolean
                statusCode:
                  type: integer
                  nullable: true
                error:
                  type: string
                  nullable: true
                url:
                  type: string
        cgnatNote:
          type: string
          nullable: true
          description: Present when no public IPv4 was discovered; explains CGNAT as a common cause.
        dns:
          type: object
          properties:
            wildcardProbeToken:
              type: string
              description: Label segment used in catch-all probe hostnames (`<token>.<apex>`).
            rows:
              type: array
              items:
                $ref: "#/components/schemas/DnsReportRow"
    DnsReportRow:
      type: object
      properties:
        rowKind:
          type: string
          enum: [apex, wildcard]
        label:
          type: string
        displayName:
          type: string
        queryName:
          type: string
          description: For `wildcard` rows, the one-off probe FQDN queried for that apex (also shown in the management UI under `*.apex`).
        ipv4:
          type: array
          items:
            type: string
        ipv6:
          type: array
          items:
            type: string
        errors:
          type: array
          items:
            type: string
        matchesPublicIpv4:
          type: boolean
        matchesPublicIpv6:
          type: boolean
    RouteTarget:
      type: object
      properties:
        url:
          type: string
        healthy:
          type: boolean
        healthCheckedAt:
          type: string
          format: date-time
          description: Present when `options.healthPath` is set; time of the last completed probe for this upstream.
    RouteEntry:
      type: object
      properties:
        host:
          type: string
        type:
          type: string
          enum: [persistent, ephemeral]
        targets:
          type: array
          items:
            $ref: "#/components/schemas/RouteTarget"
        options:
          type: object
        baseDomain:
          type: string
        rootDomain:
          type: string
        publicUrl:
          type: string
        publicUrlHttp:
          type: string
